spring.application.name=ms-pagos
server.port=8088

# H2 in-memory database for unit testing
spring.datasource.url=jdbc:h2:mem:db_pagos;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Keep open-in-view disabled
spring.jpa.open-in-view=false

# Disable SQL initialization in tests to prevent data.sql from running
spring.sql.init.mode=never
