# Configuracion del servidor
server.port=8088
spring.application.name=ms-pagos

# Configuracion de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuracion de base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_pagos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar advertencias de Open-In-View
spring.jpa.open-in-view=false

# Inicializacion automatica de base de datos
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# Springdoc OpenAPI Config
springdoc.swagger-ui.path=/api/pagos/swagger-ui.html
springdoc.api-docs.path=/api/pagos/v3/api-docs


